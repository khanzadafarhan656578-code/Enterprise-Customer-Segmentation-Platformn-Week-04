version: '3.8'

services:
  web:
    build: .
    container_name: customer_segmentation_web
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - APP_NAME="Enterprise Customer Segmentation Platform"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./charts:/app/charts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/system/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: customer_segmentation_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
