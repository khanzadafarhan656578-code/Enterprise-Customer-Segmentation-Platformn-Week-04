services:
  - type: web
    name: customer-segmentation-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEBUG
        value: false
      - key: APP_NAME
        value: Enterprise Customer Segmentation Platform
